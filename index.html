<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>황선혜 — 네이버 쇼핑 디자이너</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      max-width: 560px;
      width: 100%;
    }

    .tag {
      font-size: 12px;
      letter-spacing: 0.12em;
      color: #666;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 12px;
    }

    .role {
      font-size: 16px;
      color: #888;
      margin-bottom: 48px;
      line-height: 1.6;
    }

    .role span {
      color: #03C75A;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: #333;
      margin-bottom: 48px;
    }

    .section-label {
      font-size: 11px;
      letter-spacing: 0.14em;
      color: #444;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .interests {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .interests li {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 18px;
      font-weight: 500;
      color: #e0e0e0;
    }

    .interests li::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #03C75A;
      flex-shrink: 0;
    }

    .footer {
      margin-top: 56px;
      font-size: 12px;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="tag">Naver Shopping</p>
    <h1>황선혜</h1>
    <p class="role">
      <span>커머스설계팀</span> 프로덕트 디자이너<br>
      더 나은 쇼핑 경험을 만들고 있어요.
    </p>

    <div class="divider"></div>

    <p class="section-label">요즘 관심사</p>
    <ul class="interests">
      <li>AI Agent</li>
      <li>관계</li>
      <li>성장</li>
    </ul>

    <p class="footer">만든 날 · 2026</p>
  </div>
</body>
</html>
